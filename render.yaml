services:
  - type: web
    name: nashi-dela
    runtime: python
    pythonVersion: "3.11.6"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /tmp/family_chores.db
    healthCheckPath: /api/users
